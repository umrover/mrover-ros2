- name: Install platform-specific packages
  ansible.builtin.include_tasks: "{{ ansible_pkg_mgr }}.yml"

- name: Install oh-my-zsh
  ansible.builtin.git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: ~/.oh-my-zsh
    version: master

- name: Install zsh-autosuggestions
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: ~/.oh-my-zsh/custom/plugins/zsh-autosuggestions

- name: Install zsh-syntax-highlighting
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting
    dest: ~/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting

- name: Deploy mrover oh-my-zsh theme
  ansible.builtin.copy:
    src: files/home/.oh-my-zsh/custom/themes/mrover.zsh-theme
    dest: ~/.oh-my-zsh/custom/themes/mrover.zsh-theme

- name: Deploy mrover tmux config
  ansible.builtin.copy:
    src: files/home/.mrover.tmux.conf
    dest: ~/.mrover.tmux.conf

- name: Source mrover tmux config
  ansible.builtin.blockinfile:
    path: ~/.tmux.conf
    marker: "# {mark} MROVER"
    block: source-file ~/.mrover.tmux.conf
    create: true

- name: Set zsh as default shell
  become: true
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    shell: /usr/bin/zsh

- name: Install VSCode extension
  ansible.builtin.command: code --install-extension {{ mrover_repo }}/pkg/file-selector-0.0.1.vsix
