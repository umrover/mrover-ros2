- name: USB Rules
  become: true
  synchronize:
    src: files/rules/
    dest: /etc/udev/rules.d
    recursive: true

- name: udev Reload Rules
  become: true
  ansible.builtin.command: udevadm control --reload-rules

- name: udev TTY Trigger
  become: true
  ansible.builtin.command: udevadm trigger --subsystem-match=tty
