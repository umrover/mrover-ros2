---
- hosts: all
  vars:
    ros_distro: humble
    ubuntu_release: jammy
    ifname: eth0
  roles:
    - jetson_pre_build
    - build
    - jetson_build
    - jetson_networks
    - dev
  post_tasks:
    - name: Deploy mrover shell config
      copy:
        src: "{{ playbook_dir }}/roles/dev/files/home/.mrover.zshenv"
        dest: ~/.mrover.zshenv
    - name: Source mrover shell config
      blockinfile:
        path: ~/.zshenv
        marker: "# {mark} MROVER"
        block: source ~/.mrover.zshenv
        create: true
