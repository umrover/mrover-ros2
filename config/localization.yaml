# All units are in SI
# ===================
# Time:     second, hz
# Angle:    radian
# Distance: meter

/**:
  ros__parameters:
    world_frame: "map"
    gps_frame: "gps_frame"

basestation_gps_driver:
  ros__parameters:
    port: /dev/ublox_gps
    baud: 38400

rover_gps_driver:
  ros__parameters:
    port_unicore: /dev/unicore_gps
    baud_unicore: 115200

    port_ublox: /dev/ublox_gps
    baud_ublox: 38400

heading_filter:
  ros__parameters:
    imu_watchdog_timeout: 1.0
    mag_heading_noise: 10.0
    rtk_heading_noise: 0.00001
    drive_forward_heading_noise: 0.0001
    process_noise: 0.000001
    minimum_linear_speed: 0.4
    rover_heading_change_threshold: 0.05
    use_mag: false
    use_rtk_only: false

pose_filter:
  ros__parameters:
    rover_heading_change_threshold: 0.05
    minimum_linear_speed: 0.4
