/**:
  ros__parameters:
    mob_cam:
      address: 10.1.0.2 # if using RTP, should be set to IP of basestation
      port: 8082
      dev_node: "/dev/mob_cam"
      dev_path: ""
      stream:
        pixel_format: MJPG # from v4l2-ctl -d DEV_NODE --list-formats-ext
        width: 640
        height: 480
        framerate: 15
        codec: H265
        bitrate: 1000000
      image_capture:
        pixel_format: YUYV
        width: 1280
        height: 720
        framerate: 5
    joint_a_cam:
      address: 10.1.0.2
      port: 8083
      dev_node: "/dev/joint_a_cam"
