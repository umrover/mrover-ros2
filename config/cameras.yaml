        width: 1280
        height: 720
        framerate: 15
        codec: H265
        bitrate: 1000000
      image_capture:
        pixel_format: ABGR32
        width: 1280
        height: 720
        framerate: 15

mob_streamer:
  ros__parameters:
    camera: "mob_cam"

joint_a_streamer:
  ros__parameters:
    camera: "joint_a_cam"

ee1_streamer:
  ros__parameters:
    camera: "ee1_cam"

ee2_streamer:
  ros__parameters:
    camera: "ee2_cam"

ee3_streamer:
  ros__parameters:
    camera: "ee3_cam"

sp1_streamer:
  ros__parameters:
    camera: "sp1_cam"

sp2_streamer:
  ros__parameters:
    camera: "sp2_cam"

zed_mini_streamer:
  ros__parameters:
    camera: "zed_mini"

zed_streamer:
  ros__parameters:
    camera: "zed"

camera_client:
  ros__parameters:
    test: 10
    cameras:
      - "mob_cam"
      - "joint_a_cam"
      - "ee1_cam"
      - "ee2_cam"
      - "ee3_cam"
      - "sp1_cam"
      - "sp2_cam"
      - "zed_mini"
      - "zed"
    rtp_jitter_ms: 50

