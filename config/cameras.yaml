/**:
  ros__parameters:
    zed_mini:
      address: 10.1.0.2
      port: 8086
      image_topic: "/zed_mini/left/image"
      stream:
        pixel_format: ABGR32 # https://www.kernel.org/doc/html/v4.9/media/uapi/v4l/pixfmt-packed-rgb.html
        width: 1280
        height: 720
        framerate: 15
        codec: H265
        bitrate: 1000000
      image_capture:
        pixel_format: ABGR32
        width: 1280
        height: 720
        framerate: 15
    zed:
      address: 10.1.0.2
      port: 8087
      image_topic: "/zed/left/image"
      stream:
        pixel_format: ABGR32 # https://www.kernel.org/doc/html/v4.9/media/uapi/v4l/pixfmt-packed-rgb.html
        width: 1280
        height: 720
        framerate: 15
        codec: H265
        bitrate: 1000000
      image_capture:
        pixel_format: ABGR32
        width: 1280
        height: 720
        framerate: 15

zed_mini_streamer:
  ros__parameters:
    camera: "zed_mini"

zed_streamer:
  ros__parameters:
    camera: "zed"

camera_client:
  ros__parameters:
    test: 10
    cameras:
      - "zed_mini"
      - "zed"
    rtp_jitter_ms: 50

