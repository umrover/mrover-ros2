
# All units are in SI
# ===================
# Time:     second, hz
# Angle:    radian
# Distance: meter

stereo_object_detector:
  ros__parameters:
    camera_frame: "zed_left_camera_frame"
    world_frame: "map"
    increment_weight: 2
    decrement_weight: 1
    hitcount_max: 30
    bottle_model_name: "bottle"
    mallet_model_name: "mallet"
    pick_model_name: "pick"
    bottle_threshold: 10
    mallet_threshold: 10
    pick_threshold: 10
    model_score_threshold: 0.75
    model_nms_threshold: 0.5
    detection_distance_threshold: 15.0

image_object_detector:
  ros__parameters:
    camera_frame: "zed_left_camera_frame"
    world_frame: "map"
    increment_weight: 2
    decrement_weight: 1
    hitcount_max: 10
    bottle_model_name: "bottle"
    mallet_model_name: "mallet"
    pick_model_name: "pick"
    bottle_threshold: 5
    mallet_threshold: 5
    pick_threshold: 5
    model_score_threshold: 0.75
    model_nms_threshold: 0.5
    long_range_camera/fov: 10.0